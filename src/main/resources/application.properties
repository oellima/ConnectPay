# Nome do seu projeto
spring.application.name=ConnectPay

# Configuraš§es do Banco H2 (Banco em memˇria)
spring.datasource.url=jdbc:h2:mem:connectpaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Libera o console do banco no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mostra o SQL que o Hibernate gerar no console do IntelliJ
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update